services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      IG_COOKIES: ${IG_COOKIES:-}
      TIKTOK_COOKIES: ${TIKTOK_COOKIES:-}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS}
      STORAGE_PATH: /app/data/storage.json
    volumes:
      - bot-data:/app/data

volumes:
  bot-data:
